name: Market-Monitor-Automation

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1-5' # 台北時間週一至五 17:00 執行 (UTC 9:00)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Analysis
        run: python reminder.py
